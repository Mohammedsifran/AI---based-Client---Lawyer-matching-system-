<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Client - Lawyer Matching</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <a href="/" class="logo">Client - Lawyer Matching</a>
            </nav>
        </div>
    </header>

    <div class="auth-container" style="border-top: 5px solid #333;">
        <h2 style="text-align: center;">Admin Console Login</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}"
            style="color: {{ 'red' if category == 'error' else 'green' }}; text-align: center; margin-bottom: 10px;">{{
            message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <form action="/admin-login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; background-color: #333;">Login to
                Dashboard</button>
        </form>
    </div>
</body>

</html>
