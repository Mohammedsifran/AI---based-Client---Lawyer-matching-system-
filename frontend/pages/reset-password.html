<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Client - Lawyer Matching</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <a href="/" class="logo">Client - Lawyer Matching</a>
            </nav>
        </div>
    </header>

    <div class="auth-container">
        <h2 style="text-align: center;">Reset Password</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}"
            style="color: {{ 'red' if category == 'error' else 'green' }}; text-align: center; margin-bottom: 10px;">{{
            message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <p style="text-align: center; margin-bottom: 20px; color: #555;">Please enter your new password.</p>
        <form action="/reset-password" method="POST">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" minlength="6" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" minlength="6" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Update Password</button>
        </form>
    </div>
</body>

</html>
