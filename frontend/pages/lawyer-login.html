<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lawyer Login - Client - Lawyer Matching</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <a href="/" class="logo">Client - Lawyer Matching</a>
            </nav>
        </div>
    </header>

    <div class="auth-container" style="border-top: 5px solid var(--secondary-color);">
        <h2 style="text-align: center;">Lawyer Login</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}" style="color: red; text-align: center; margin-bottom: 10px;">{{ message
            }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="/lawyer-login" method="POST">
            <div class="form-group">
                <label for="email">Email Address or Username</label>
                <input type="text" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-secondary" style="width: 100%; color: var(--primary-color);">Login to
                Portal</button>
        </form>
        <p style="text-align: center; margin-top: 1rem;">
            <a href="forgot-password.html?role=Lawyer" style="color: #666; font-size: 0.9rem;">Forgot Password?</a>
        </p>
        <p style="text-align: center; margin-top: 1rem;">
            New to Client - Lawyer Matching? <a href="lawyer-register.html"
                style="color: var(--secondary-color); font-weight: 600; filter: brightness(0.8);">Create Account</a>
        </p>
    </div>
</body>

</html>
