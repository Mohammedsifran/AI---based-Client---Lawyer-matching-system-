<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Client - Lawyer Matching</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <a href="/" class="logo">Client - Lawyer Matching</a>
            </nav>
        </div>
    </header>

    <div class="auth-container">
        <h2 style="text-align: center;">Verify OTP</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}"
            style="color: {{ 'red' if category == 'error' else 'green' }}; text-align: center; margin-bottom: 10px;">{{
            message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <p style="text-align: center; margin-bottom: 20px; color: #555;">Please enter the 6-digit OTP sent to your email.</p>
        <form action="/verify-otp" method="POST">
            <div class="form-group">
                <label for="otp_code">6-Digit OTP</label>
                <input type="text" id="otp_code" name="otp_code" maxlength="6" pattern="\d{6}" title="Please enter 6 numbers" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Verify OTP</button>
        </form>
    </div>
</body>

</html>
